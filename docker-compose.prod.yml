services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safesphere_api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongodb:
    image: mongo:7
    container_name: safesphere_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:

